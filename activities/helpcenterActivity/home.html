
<!DOCTYPE html>
<html>
	<head>
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <meta name="color-scheme" content="dark light">
        <link rel="icon" href="../../assets/pics/logos/hiosbadge.png" type="image/icon type">
		<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
        <link rel="stylesheet" href="../../assets/css/style.css" type="text/css">
        <link rel="stylesheet" href="../../assets/css/ripple.css" type="text/css">
        <link rel="stylesheet" href="../../assets/css/toggle.css" type="text/css">
        <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Rounded:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200" />
        <script src="../../assets/scripts/links.js"></script>
		<title>HiOS | Help</title>
	</head>
    <body>
		<!--The universal background image-->
		<div class="background-wrapper">
			<div class="background-image"></div>
		</div>
		<main class="container mt-4 mb-5">
            <div class="row mb-2">
                <div class="col-12">
                    <div class="card full">
                        <div class="card-body">
                            <div class="top-container">
                                <h1 class="blue-h2"><span class="titleIcon material-symbols-rounded">help</span>Help</h1>
                                <p id="para">Choose a help article from below</p>
                            </div>             
                        </div>
                    </div>
                </div>
            </div>

            <div class="row g-2">
                <div class="col-12">
                    <div class="card full">
                        <div class="card-body">
					        <h2 class="card-title">How to use HiOSMobile™</h2>
                            <button class="ripple-button joinTop roundedImage button" onclick="link('helpcenter_activities/nav_activity.html')">
                                <span class="material-symbols-rounded">developer_guide</span>
                                <span class="button-text">Navigation Tutorial</span>
                            </button>
                        </div>
                    </div>

                    <div class="card full mt-2">
                        <div class="card-body">
                            <h2 class="card-title">General</h2>
                            <button class="ripple-button joinTop roundedImage button" onclick="link('helpcenter_activities/food_activity.html')">
                                <span class="material-symbols-rounded">restaurant</span>
                                <span class="button-text">Food</span>
                            </button>
                            <button class="ripple-button joinMiddle roundedImage button" onclick="link('helpcenter_activities/hotel_activity.html')">
                                <span class="material-symbols-rounded">hotel</span>
                                <span class="button-text">Hotel</span>
                            </button>
                            <button class="ripple-button joinMiddle roundedImage button" onclick="link('helpcenter_activities/roomkey_activity.html')">
                                <span class="material-symbols-rounded">key</span>
                                <span class="button-text">Room Key</span>
                            </button>
                            <button class="ripple-button joinMiddle roundedImage button" onclick="link('helpcenter_activities/support_activity.html')">
                                <span class="material-symbols-rounded">support_agent</span>
                                <span class="button-text">Support</span>
                            </button>
                            <button class="ripple-button joinBottom roundedImage button" onclick="link('helpcenter_activities/internet_activity.html')">
                                <span class="material-symbols-rounded">network_wifi</span>
                                <span class="button-text">WiFi and Internet</span>
                            </button>
                        </div>
                    </div>
                </div>
            </div>
        </main>
		<script src="../../assets/scripts/background.js"></script>
		<script src="../../assets/scripts/ripple.js"></script>
		<script src="../../assets/scripts/bootstrap-shim.js"></script>
    </body>
</html>
